name: Quality

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality:
    name: Black, Ruff, MyPy and PyTest
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Black
        run: python -m black --check src tests migrations

      - name: Ruff
        run: python -m ruff check src tests migrations

      - name: MyPy
        run: python -m mypy src tests migrations

      - name: PyTest
        run: python -m pytest
